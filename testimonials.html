        class SwipeDetector {
        constructor(element, threshold = 50) {
            this.element = element;
            this.startX = 0;
            this.startY = 0;
            this.threshold = threshold;
            this.swiping = false;
    
            element.addEventListener('mousedown', this.handleTouchStart.bind(this));
            element.addEventListener('touchstart', this.handleTouchStart.bind(this));
            element.addEventListener('mouseup', this.handleTouchEnd.bind(this));
            element.addEventListener('touchend', this.handleTouchEnd.bind(this));
            element.addEventListener('mousemove', this.handleTouchMove.bind(this));
            element.addEventListener('touchmove', this.handleTouchMove.bind(this));
        }
    
        handleTouchStart(event) {
            this.swiping = true;
            this.startX = event.type.startsWith('mouse') ? event.clientX : event.touches[0].clientX;
            this.startY = event.type.startsWith('mouse') ? event.clientY : event.touches[0].clientY;
        }
    
        handleTouchMove(event) {
            if (!this.swiping) return;
            const currentX = event.type.startsWith('mouse') ? event.clientX : event.touches[0].clientX;
            const currentY = event.type.startsWith('mouse') ? event.clientY : event.touches[0].clientY;
    
            const diffX = currentX - this.startX;
            const diffY = currentY - this.startY;
    
            if (Math.abs(diffX) > this.threshold || Math.abs(diffY) > this.threshold) {
                this.swiping = false;
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    this.onSwipe(diffX > 0 ? 'right' : 'left');
                } else {
                    this.onSwipe(diffY > 0 ? 'down' : 'up');
                }
            }
        }
    
        handleTouchEnd() {
            this.swiping = false;
        }
    
        onSwipe(direction) {
            console.log(`Swiped ${direction}`);
            if (direction == "left") {
                swipeRight();
                
            }
            else if (direction == "right") {
                swipeLeft();
            }
        }
    }
